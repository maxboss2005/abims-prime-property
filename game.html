        function update(delta) {
            const p = game.player;
            // Player movement
            updatePlayer();
            // Enemy AI
            updateEnemies();
            // Camera
            updateCamera();
            // Cooldowns
            if (game.combatCooldown > 0) game.combatCooldown--;
            if (p.hurt) p.hurt = false;
            // HP/MP regen
            if (Math.random() < 0.002) {
                p.hp = Math.min(p.maxHp, p.hp + 1);
                p.mp = Math.min(p.maxMp, p.mp + 0.5);
            }
            // Auto-save timer
            game.saveTimer += delta / 1000;
            if (game.saveTimer >= game.autoSaveInterval) {
                game.saveTimer = 0;
                autoSave();
            }
            // Check location
            const px = Math.round(p.x),
                py = Math.round(p.y);
            const tile = game.map[py]?.[px];
            if (tile === T.VILLAGE_FLOOR || tile === T.HOUSE) p.location = 'village';
            else if (tile === T.DUNGEON_FLOOR) p.location = 'dungeon';
            else if (tile === T.CASTLE_FLOOR) p.location = 'castle';
            else if (py < 20 && px < 20) p.location = 'forest';
            else p.location = 'wilderness';
            // Damage flash
            if (game.damageFlash > 0) game.damageFlash--;
            // Update UI periodically
            updateUI();
        }

        // ---- RESIZE ----
        function resizeCanvas() {
            const wrapper = document.getElementById('game-wrapper');
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;
            const dpr = 1;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.getContext('2d').scale(dpr, dpr);
            // Minimap
            const mini = document.getElementById('minimap');
            const mw = mini.clientWidth || 140;
            const mh = mini.clientHeight || 140;
            miniCanvas.width = mw;
            miniCanvas.height = mh;
            miniCanvas.style.width = mw + 'px';
            miniCanvas.style.height = mh + 'px';
        }

        // ---- KEYBOARD ----
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            game.keys[key] = true;
            if (key === ' ' || key === 'enter') {
                e.preventDefault();
                playerAttack();
            }
            if (key === 'i') document.getElementById('btn-inventory').click();
            if (key === 'q') document.getElementById('btn-quests').click();
            if (key === 'c') document.getElementById('btn-stats').click();
            if (key === 'escape') {
                const modal = document.getElementById('modal-pause');
                modal.classList.toggle('active');
            }
            if (key === 'e') {
                // Interact with nearby NPC
                const p = game.player;
                for (const npc of game.npcs) {
                    if (dist(p, npc) < 2.5) {
                        interactWithNPC(npc);
                        break;
                    }
                }
            }
        });
        document.addEventListener('keyup', (e) => {
            game.keys[e.key.toLowerCase()] = false;
        });

        // ---- TOUCH CONTROLS ----
        document.querySelectorAll('.dpad-btn[data-dir]').forEach(el => {
            const dir = el.dataset.dir;
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                game.touchDir = dir;
                el.classList.add('active');
            });
            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (game.touchDir === dir) game.touchDir = null;
                el.classList.remove('active');
            });
            el.addEventListener('touchcancel', (e) => {
                game.touchDir = null;
                el.classList.remove('active');
            });
            // Mouse fallback
            el.addEventListener('mousedown', () => {
                game.touchDir = dir;
                el.classList.add('active');
            });
            el.addEventListener('mouseup', () => {
                game.touchDir = null;
                el.classList.remove('active');
            });
            el.addEventListener('mouseleave', () => {
                if (game.touchDir === dir) game.touchDir = null;
                el.classList.remove('active');
            });
        });

        // ---- UI EVENTS ----
        // Modal close buttons
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.close;
                document.getElementById(id).classList.remove('active');
            });
        });
        // Click outside to close
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        // Inventory button
        document.getElementById('btn-inventory').addEventListener('click', () => {
            document.getElementById('modal-inventory').classList.toggle('active');
            updateUI();
        });
        // Quests button
        document.getElementById('btn-quests').addEventListener('click', () => {
            document.getElementById('modal-quests').classList.toggle('active');
            renderQuests();
        });
        // Stats button
        document.getElementById('btn-stats').addEventListener('click', () => {
            document.getElementById('modal-stats').classList.toggle('active');
            updateStatsPanel();
        });
        // Save button
        document.getElementById('btn-save').addEventListener('click', saveGame);
        // Shop sell button
        document.getElementById('btn-shop-sell')?.addEventListener('click', () => {
            const p = game.player;
            if (p.inventory.length === 0) {
                showNotification('No items to sell');
                return;
            }
            // Simple: sell all non-equipped items one by one
            const toSell = [...p.inventory];
            for (const item of toSell) {
                if (!isEquipped(item)) {
                    const idx = p.inventory.indexOf(item);
                    if (idx !== -1) {
                        const price = Math.floor((item.price || 10) * 0.5);
                        p.gold += price;
                        p.inventory.splice(idx, 1);
                    }
                }
            }
            showNotification('💰 Sold all sellable items!');
            updateUI();
        });

        // ---- CLICK ON CANVAS FOR INTERACTION ----
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const cx = game.camera.x + mx * (canvas.width / TILE_SIZE);
            const cy = game.camera.y + my * (canvas.height / TILE_SIZE);
            // Check if clicked on NPC
            for (const npc of game.npcs) {
                if (dist({ x: cx, y: cy }, npc) < 0.8) {
                    interactWithNPC(npc);
                    return;
                }
            }
            // Check if clicked on enemy (attack)
            for (const e of game.enemies) {
                if (e.hp <= 0) continue;
                if (dist({ x: cx, y: cy }, e) < 0.8) {
                    playerAttack();
                    return;
                }
            }
            // Move toward click (optional)
        });

        // ---- KEYBOARD SHORTCUT FOR ATTACK ----
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                playerAttack();
            }
            // Interact with E
            if (e.key === 'e' || e.key === 'E') {
                const p = game.player;
                for (const npc of game.npcs) {
                    if (dist(p, npc) < 2.5) {
                        interactWithNPC(npc);
                        break;
                    }
                }
            }
        });

        // ---- INIT ----
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            // Load saved game or start fresh
            loadGame().then(() => {
                // If no save, init fresh
                if (game.player.inventory.length === 0 && game.player.gold === 0) {
                    initGame();
                }
                // Start loop
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }).catch(() => {
                initGame();
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            });
        }

        // ---- START ----
        init();

        console.log('⚔️ ShadowQuest RPG loaded!');
        console.log('🎮 Controls: WASD/Arrows move | Space/Enter attack | E interact');
        console.log('📱 Touch controls available on mobile');
        console.log('💾 Auto-save every 30 seconds');
    </script>

</body>
</html>
